/* ===== ADAPTIVE THEME via CSS Variables ===== */
:root {
  --bg: #0a0a1a;
  --surface: #111125;
  --border: #1e1e3a;
  --border-hover: #2a2a4a;
  --text: #e0e0f0;
  --text-muted: #999;
  --text-dim: #777;
  --text-faint: #555;
  --input-bg: rgba(255,255,255,.06);
  --input-bg-focus: rgba(255,255,255,.08);
  --accent: #8C50C8;
  --accent-dark: #6B2FA8;
  --accent-glow: rgba(140,80,200,.12);
  --title-color: #e0e0f0;
  --btn-secondary-bg: #1a1a2e;
  --btn-secondary-text: #fff;
  --toast-bg: #1a1a2e;
  --toast-text: #fff;
}
/* Light mode overrides (e.g. artifact viewer) */
@media (prefers-color-scheme: light) {
  :root {
    --bg: #f5f5f8;
    --surface: #fff;
    --border: #ddd;
    --border-hover: #bbb;
    --text: #1a1a2e;
    --text-muted: #666;
    --text-dim: #888;
    --text-faint: #aaa;
    --input-bg: rgba(0,0,0,.04);
    --input-bg-focus: rgba(0,0,0,.07);
    --title-color: #1a1a2e;
    --btn-secondary-bg: #1a1a2e;
    --btn-secondary-text: #fff;
    --toast-bg: #1a1a2e;
    --toast-text: #fff;
  }
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{-webkit-text-size-adjust:100%}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:var(--bg);color:var(--text);
  min-height:100vh;min-height:100dvh;
  padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom) 0;
  overscroll-behavior-y:contain;
}
.app{max-width:680px;margin:0 auto;padding:12px 12px 100px}
/* ===== STICKY PREVIEW ===== */
.preview-sticky{
  position:sticky;top:0;z-index:50;
  background:var(--bg);
  padding:0 0 8px;
  margin:0 -12px;
  padding-left:12px;padding-right:12px;
}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;gap:8px;padding-top:8px}
.topbar h1{font-size:17px;font-weight:700;white-space:nowrap;color:var(--title-color)}
.btn-row{display:flex;gap:6px}
button{border:none;cursor:pointer;font-size:14px;font-weight:600;padding:12px 16px;border-radius:12px;transition:all .15s;font-family:inherit;-webkit-appearance:none}
.btn-e{background:var(--accent);color:#fff}
.btn-e.on{background:var(--accent-dark)}
.btn-x{background:var(--btn-secondary-bg);color:var(--btn-secondary-text)}
.btn-x:active{transform:scale(.96)}
.pw{display:flex;justify-content:center;overflow:hidden;border-radius:10px}
.pw canvas{width:100%;max-width:480px;border-radius:10px;display:block}
/* ===== EDITOR PANELS ===== */
.ed{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:10px}
.ed-t{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.14em;color:var(--text-faint);margin-bottom:12px}
.fld{margin-bottom:14px}
.fld:last-child{margin-bottom:0}
.fld label{display:block;font-size:12px;color:var(--text-dim);margin-bottom:5px}
.fld input,.fld textarea{
  width:100%;background:var(--input-bg);border:1px solid var(--border-hover);
  border-radius:10px;padding:12px 14px;color:var(--text);font-size:16px;font-family:inherit;outline:none;
  -webkit-appearance:none;line-height:1.4;
}
.fld input:focus,.fld textarea:focus{border-color:rgba(140,100,220,.5);background:var(--input-bg-focus)}
.fld textarea{resize:none;overflow:hidden;min-height:48px}
.tog-row{display:flex;align-items:center;gap:12px;margin-bottom:0;padding:6px 0}
.tog-row span{font-size:14px;color:var(--text-muted);font-weight:500}
.tog{
  width:48px;height:28px;border-radius:14px;position:relative;cursor:pointer;
  background:rgba(128,128,128,.2);transition:background .2s;border:none;flex-shrink:0;
}
.tog.on{background:var(--accent)}
.tog::after{content:'';position:absolute;width:22px;height:22px;border-radius:50%;background:#fff;top:3px;left:3px;transition:left .2s}
.tog.on::after{left:23px}
/* ===== IMAGE ZONES ===== */
.img-zones{display:flex;gap:10px;margin-bottom:12px;position:relative}
.img-zone{
  flex:1;border:2px dashed var(--border-hover);border-radius:12px;aspect-ratio:1/1;
  display:flex;align-items:center;justify-content:center;
  position:relative;overflow:hidden;transition:border .2s;min-height:100px;
}
.img-zone.has{border-style:solid;border-color:var(--border-hover)}
.img-zone img{width:100%;height:100%;object-fit:cover;display:block;pointer-events:none}
.img-zone .ph{color:var(--text-faint);font-size:14px;text-align:center;padding:12px;pointer-events:none}
.img-zone input[type=file]{display:none}
.img-zone .rm{
  position:absolute;top:6px;right:6px;width:32px;height:32px;border-radius:50%;
  background:rgba(0,0,0,.7);color:#fff;font-size:18px;display:none;
  align-items:center;justify-content:center;border:none;z-index:3;
}
.img-zone.has .rm{display:flex}
.img-zone .crd{
  position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.5);
  border:none;border-radius:0;color:#ddd;font-size:14px;padding:8px 10px;text-align:center;
  font-family:inherit;outline:none;display:none;-webkit-appearance:none;
}
.img-zone.has .crd{display:block}
/* ===== SWAP BUTTON ===== */
.swap-btn{
  position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);z-index:5;
  width:36px;height:36px;border-radius:50%;
  background:var(--accent);color:#fff;font-size:16px;
  display:none;align-items:center;justify-content:center;
  border:none;box-shadow:0 2px 8px rgba(0,0,0,.3);
}
.swap-btn.show{display:flex}
/* ===== CROP SLIDERS ===== */
.crop-ctrl{margin-bottom:12px}
.crop-ctrl label{font-size:12px;color:var(--text-dim);display:block;margin-bottom:6px}
.crop-ctrl .sr{display:flex;align-items:center;gap:10px}
.crop-ctrl input[type=range]{
  flex:1;-webkit-appearance:none;height:8px;border-radius:4px;background:var(--border);outline:none;
  touch-action:none;
}
.crop-ctrl input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;width:26px;height:26px;border-radius:50%;background:var(--accent);
  border:2px solid #fff;cursor:pointer;
}
.crop-ctrl .vl{font-size:13px;color:var(--text-muted);min-width:36px;text-align:right;font-variant-numeric:tabular-nums}
/* ===== LAYOUT BUTTONS ===== */
.lbtns{display:flex;gap:6px;margin-bottom:14px}
.lb{
  padding:12px 8px;border-radius:10px;font-size:14px;font-weight:500;
  border:1px solid var(--border-hover);background:transparent;color:var(--text-muted);
  flex:1;text-align:center;transition:all .15s;
}
.lb.on{border-color:var(--accent);color:var(--accent);background:var(--accent-glow)}
/* ===== HINT ===== */
.hint{text-align:center;font-size:12px;color:var(--text-dim);padding:8px 0 20px}
/* ===== TOAST ===== */
.toast{
  position:fixed;bottom:40px;left:50%;transform:translateX(-50%) translateY(80px);
  background:var(--toast-bg);color:var(--toast-text);
  padding:12px 24px;border-radius:12px;font-size:14px;font-weight:600;
  box-shadow:0 4px 20px rgba(0,0,0,.3);
  opacity:0;transition:all .3s ease;z-index:999;pointer-events:none;
  white-space:nowrap;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>

var cv = document.getElementById('cv');
var cx = cv.getContext('2d');
var W = 1200, H = 1500;
var MX = 52;
// ===== STATE =====
var imgs = [null, null];
var creds = ['', ''];
var crop = [50, 50];
var layout = 'two';
var editing = false;
var allCaps = false;
var hlLines = ['Per ChatGPT das eigene Haustier zum Menschen machen'];
var subText = '';
var dateText = (function() {
  var months = ['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];
  var d = new Date();
  return d.getDate() + '. ' + months[d.getMonth()] + ' ' + d.getFullYear();
})();
// ===== RAF THROTTLE =====
var rafPending = false;
function scheduleDraw() {
  if (rafPending) return;
  rafPending = true;
  requestAnimationFrame(function() {
    rafPending = false;
    draw();
  });
}
// ===== DOM REFS =====
var $hl  = document.getElementById('inHL');
var $sub = document.getElementById('inSub');
var $date = document.getElementById('inDate');
var $EP  = document.getElementById('EP');
var $bE  = document.getElementById('bE');
var $bX  = document.getElementById('bX');
var $togCaps = document.getElementById('togCaps');
var $swapBtn = document.getElementById('swapBtn');
var $toast = document.getElementById('toast');
// Layout buttons
var $lbTwo  = document.getElementById('lbTwo');
var $lbOne  = document.getElementById('lbOne');
var $lbNone = document.getElementById('lbNone');
// ===== TOAST =====
var toastTimer = null;
function showToast(msg) {
  $toast.textContent = msg;
  $toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function() {
    $toast.classList.remove('show');
  }, 2000);
}
// ===== EVENTS (NO INLINE HANDLERS) =====
// Edit toggle
$bE.addEventListener('click', function() {
  editing = !editing;
  $EP.style.display = editing ? 'block' : 'none';
  this.textContent = editing ? '✓ Fertig' : 'Bearbeiten';
  this.classList.toggle('on', editing);
  if (!editing) {
    window.scrollTo({ top: 0, behavior: 'smooth' });
    draw();
  } else {
    autoSize($hl);
    autoSize($sub);
  }
});
// Export
$bX.addEventListener('click', function() {
  draw();
  var link = document.createElement('a');
  link.download = 'ki-news-' + new Date().toISOString().slice(0,10) + '.jpg';
  link.href = cv.toDataURL('image/jpeg', 0.95);
  link.click();
  showToast('✓ JPG gespeichert');
});
// ALL CAPS toggle
$togCaps.addEventListener('click', function() {
  allCaps = !allCaps;
  this.classList.toggle('on', allCaps);
  draw();
});
// Headline input
$hl.addEventListener('input', function() {
  var raw = this.value;
  var parts = raw.split('\n');
  if (parts.length > 2) {
    parts = parts.slice(0, 2);
    this.value = parts.join('\n');
  }
  hlLines = this.value.split('\n').filter(function(l){ return l.length > 0; });
  if (hlLines.length === 0) hlLines = [''];
  autoSize(this);
  draw();
});
// Subtitle input
$sub.addEventListener('input', function() {
  subText = this.value;
  autoSize(this);
  draw();
});
// Date input
$date.addEventListener('input', function() {
  dateText = this.value;
  draw();
});
// Layout buttons
function setLayout(l) {
  layout = l;
  [$lbTwo, $lbOne, $lbNone].forEach(function(b){ b.classList.remove('on'); });
  if (l === 'two')  $lbTwo.classList.add('on');
  if (l === 'one')  $lbOne.classList.add('on');
  if (l === 'none') $lbNone.classList.add('on');
  document.getElementById('imgEd').style.display = (l === 'none') ? 'none' : 'block';
  document.getElementById('z1').style.display = (l === 'two') ? 'flex' : 'none';
  // FIX #4: Only show crop slider if layout allows AND image exists
  updateCropVisibility();
  updateSwapBtn();
  draw();
}
$lbTwo.addEventListener('click',  function(){ setLayout('two'); });
$lbOne.addEventListener('click',  function(){ setLayout('one'); });
$lbNone.addEventListener('click', function(){ setLayout('none'); });
// ===== CROP VISIBILITY (FIX #4) =====
function updateCropVisibility() {
  document.getElementById('cc0').style.display = (layout !== 'none' && imgs[0]) ? 'block' : 'none';
  document.getElementById('cc1').style.display = (layout === 'two' && imgs[1]) ? 'block' : 'none';
}
// ===== SWAP BUTTON (FIX #7) =====
function updateSwapBtn() {
  var canSwap = layout === 'two' && imgs[0] && imgs[1];
  $swapBtn.classList.toggle('show', !!canSwap);
}
$swapBtn.addEventListener('click', function(e) {
  e.stopPropagation();
  // Swap images
  var tmpImg = imgs[0]; imgs[0] = imgs[1]; imgs[1] = tmpImg;
  var tmpCr  = creds[0]; creds[0] = creds[1]; creds[1] = tmpCr;
  var tmpCp  = crop[0]; crop[0] = crop[1]; crop[1] = tmpCp;
  // Sync UI
  for (var i = 0; i < 2; i++) {
    var pv = document.getElementById('pv' + i);
    var ph = document.getElementById('ph' + i);
    var z  = document.getElementById('z' + i);
    var cr = document.getElementById('cr' + i);
    var sl = document.getElementById('sl' + i);
    var vl = document.getElementById('vl' + i);
    if (imgs[i]) {
      pv.src = imgs[i].src;
      pv.style.display = 'block';
      ph.style.display = 'none';
      z.classList.add('has');
    } else {
      pv.style.display = 'none';
      ph.style.display = 'block';
      z.classList.remove('has');
    }
    cr.value = creds[i];
    sl.value = crop[i];
    vl.textContent = crop[i] + '%';
  }
  updateCropVisibility();
  draw();
});
// Image zones + crop sliders + credit inputs
[0, 1].forEach(function(i) {
  var zone = document.getElementById('z' + i);
  var fileInput = document.getElementById('f' + i);
  var rmBtn = document.getElementById('rm' + i);
  zone.addEventListener('click', function(e) {
    if (e.target === rmBtn || e.target.classList.contains('crd')) return;
    if (!imgs[i]) fileInput.click();
  });
  fileInput.addEventListener('change', function() {
    var file = this.files[0];
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function(ev) {
      var im = new Image();
      im.onload = function() {
        imgs[i] = im;
        var pv = document.getElementById('pv' + i);
        pv.src = ev.target.result;
        pv.style.display = 'block';
        document.getElementById('ph' + i).style.display = 'none';
        document.getElementById('z' + i).classList.add('has');
        crop[i] = 50;
        document.getElementById('sl' + i).value = 50;
        document.getElementById('vl' + i).textContent = '50%';
        updateCropVisibility();
        updateSwapBtn();
        draw();
      };
      im.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  });
  rmBtn.addEventListener('click', function(e) {
    e.stopPropagation();
    imgs[i] = null;
    creds[i] = '';
    crop[i] = 50;
    document.getElementById('pv' + i).style.display = 'none';
    document.getElementById('ph' + i).style.display = 'block';
    document.getElementById('z' + i).classList.remove('has');
    document.getElementById('f' + i).value = '';
    document.getElementById('cr' + i).value = '';
    document.getElementById('sl' + i).value = 50;
    document.getElementById('vl' + i).textContent = '50%';
    updateCropVisibility();
    updateSwapBtn();
    draw();
  });
  // Crop slider – uses rAF throttle (FIX #8)
  document.getElementById('sl' + i).addEventListener('input', function() {
    crop[i] = +this.value;
    document.getElementById('vl' + i).textContent = this.value + '%';
    scheduleDraw();
  });
  // Credit input
  document.getElementById('cr' + i).addEventListener('input', function() {
    creds[i] = this.value;
    draw();
  });
});
// ===== AUTOSIZE TEXTAREA =====
function autoSize(el) {
  el.style.height = 'auto';
  el.style.height = el.scrollHeight + 'px';
}
// ===== DRAW =====
function draw() {
  cx.clearRect(0, 0, W, H);
  // === EXACT GRADIENT from Main_Keynote_Background ===
  var grad = cx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0,    '#00546b'); // Top: dark teal
  grad.addColorStop(0.20, '#0f4865'); // Teal-navy transition
  grad.addColorStop(0.40, '#1d2f4f'); // Navy
  grad.addColorStop(0.50, '#202445'); // Navy-purple
  grad.addColorStop(0.60, '#221b3d'); // Dark navy-purple
  grad.addColorStop(0.80, '#250c31'); // Aubergine
  grad.addColorStop(1,    '#250129'); // Deep purple-black
  cx.fillStyle = grad;
  cx.fillRect(0, 0, W, H);
  // ===== LAYOUT DEPENDENT SECTION =====
  var topPad = 55;
  var footerH = 100;
  var availH = H - topPad - footerH;
  var headlineText = hlLines.join('\n');
  if (allCaps) headlineText = headlineText.toUpperCase();
  var subDisplay = allCaps && subText ? subText.toUpperCase() : subText;
  if (layout === 'none') {
    // ===== NO IMAGE MODE =====
    var hlFS = hlLines.length > 1 ? 130 : 140;
    var subFS = 42;
    // FIX #6: Shrink subtitle if too long
    cx.font = '700 ' + subFS + 'px Festivo, serif';
    if (subDisplay && cx.measureText(subDisplay).width > W - MX * 2) {
      subFS = Math.floor(subFS * (W - MX * 2) / cx.measureText(subDisplay).width);
    }
    // Measure text block
    var hlLineH = Math.round(hlFS * 1.08);
    var hlBlockH = hlLines.length * hlLineH;
    var subBlockH = subDisplay ? (subFS + 30) : 0;
    var textBlockH = hlBlockH + subBlockH;
    // Center vertically
    var curY = topPad + Math.round((availH - textBlockH) / 2);
    cx.font = 'bold ' + hlFS + 'px Festivo, serif';
    cx.fillStyle = '#ffffff';
    cx.textBaseline = 'top';
    var hlLinesArr = headlineText.split('\n');
    for (var li = 0; li < hlLinesArr.length; li++) {
      cx.fillText(hlLinesArr[li], MX, curY + li * hlLineH);
    }
    curY += hlBlockH;
    if (subDisplay) {
      curY += 20;
      cx.font = '700 ' + subFS + 'px Festivo, serif';
      cx.fillStyle = 'rgba(210,225,240,0.9)';
      cx.fillText(subDisplay, MX, curY);
    }
  } else {
    // ===== IMAGE MODES =====
    var hlFS2 = hlLines.length > 1 ? 110 : 120;
    var subFS2 = 34;
    var hlLineH2 = Math.round(hlFS2 * 1.08);
    // FIX #6: Shrink subtitle if too long
    cx.font = '700 ' + subFS2 + 'px Festivo, serif';
    if (subDisplay && cx.measureText(subDisplay).width > W - MX * 2) {
      subFS2 = Math.floor(subFS2 * (W - MX * 2) / cx.measureText(subDisplay).width);
    }
    // Text area
    var curY2 = topPad;
    cx.font = 'bold ' + hlFS2 + 'px Festivo, serif';
    cx.fillStyle = '#ffffff';
    cx.textBaseline = 'top';
    var hlArr2 = headlineText.split('\n');
    for (var j = 0; j < hlArr2.length; j++) {
      cx.fillText(hlArr2[j], MX, curY2 + j * hlLineH2);
    }
    curY2 += hlArr2.length * hlLineH2;
    if (subDisplay) {
      curY2 += 14;
      cx.font = '700 ' + subFS2 + 'px Festivo, serif';
      cx.fillStyle = 'rgba(210,225,240,0.9)';
      cx.fillText(subDisplay, MX, curY2);
      curY2 += subFS2 + 10;
    }
    // Image area
    var imgTop = curY2 + 24;
    var imgBot = H - footerH;
    var imgH = imgBot - imgTop;
    if (imgH < 80) imgH = 80;
    if (layout === 'two') {
      var gap = 16;
      var imgW = Math.round((W - MX * 2 - gap) / 2);
      drawCroppedImage(0, MX, imgTop, imgW, imgH);
      drawCroppedImage(1, MX + imgW + gap, imgTop, imgW, imgH);
    } else {
      drawCroppedImage(0, MX, imgTop, W - MX * 2, imgH);
    }
  }
  // ===== FOOTER =====
  var barY = H - footerH;
  cx.textBaseline = 'bottom';
  // vandieken.com centered
  cx.textAlign = 'center';
  cx.fillStyle = 'rgba(200,210,230,0.85)';
  cx.font = '500 32px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif';
  cx.fillText('vandieken.com', W / 2, H - 32);
  // Date left
  cx.textAlign = 'left';
  cx.fillStyle = 'rgba(180,195,215,0.6)';
  cx.font = '500 24px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif';
  cx.fillText(dateText, MX, H - 34);
  // Logo right
  if (LOGO.complete && LOGO.naturalWidth > 0) {
    var lh = 56;
    var lw = lh * (LOGO.naturalWidth / LOGO.naturalHeight);
    cx.globalAlpha = 0.85;
    cx.drawImage(LOGO, W - MX - lw, H - 32 - lh + 6, lw, lh);
    cx.globalAlpha = 1;
  }
  cx.textBaseline = 'alphabetic';
  cx.textAlign = 'left';
}
// ===== DRAW CROPPED IMAGE =====
function drawCroppedImage(idx, dx, dy, dw, dh) {
  var img = imgs[idx];
  if (!img) {
    // Placeholder
    cx.fillStyle = '#f0f0f0';
    cx.fillRect(dx, dy, dw, dh);
    cx.fillStyle = '#bbb';
    cx.font = '600 28px -apple-system,sans-serif';
    cx.textAlign = 'center';
    cx.textBaseline = 'middle';
    cx.fillText('Bild ' + (idx + 1), dx + dw / 2, dy + dh / 2);
    cx.textAlign = 'left';
    return;
  }
  var iw = img.naturalWidth, ih = img.naturalHeight;
  var destRatio = dw / dh;
  var srcRatio = iw / ih;
  var sx, sy, sw, sh;
  if (srcRatio > destRatio) {
    sh = ih; sw = ih * destRatio;
    sy = 0;
    sx = (iw - sw) * (crop[idx] / 100);
  } else {
    sw = iw; sh = iw / destRatio;
    sx = 0;
    sy = (ih - sh) * (crop[idx] / 100);
  }
  cx.drawImage(img, sx, sy, sw, sh, dx, dy, dw, dh);
  // Credit overlay
  if (creds[idx]) {
    cx.fillStyle = 'rgba(0,0,0,0.45)';
    cx.fillRect(dx, dy + dh - 40, dw, 40);
    cx.font = '500 20px -apple-system,sans-serif';
    cx.fillStyle = 'rgba(255,255,255,0.85)';
    cx.textAlign = 'center';
    cx.textBaseline = 'middle';
    cx.fillText(creds[idx], dx + dw / 2, dy + dh - 20);
    cx.textAlign = 'left';
  }
}
// ===== INIT =====
function init() {
  $date.value = dateText;
  autoSize($hl);
  draw();
}
if (document.fonts && document.fonts.ready) {
  document.fonts.ready.then(init);
} else {
  window.addEventListener('load', init);
}
window.addEventListener('orientationchange', function(){ setTimeout(draw, 300); });
})();
</script>
