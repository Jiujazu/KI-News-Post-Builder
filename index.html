<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="KI News">
<meta name="theme-color" content="#0a0a1a">
<title>KI News Post Generator</title>
<style>
@font-face {
  font-family:'Festivo';
  src:url('FestivoLC-Basic.otf') format('opentype');
  font-weight:normal;font-style:normal;font-display:swap;
}
/* ===== ADAPTIVE THEME via CSS Variables ===== */
:root {
  --bg: #0a0a1a;
  --surface: #111125;
  --border: #1e1e3a;
  --border-hover: #2a2a4a;
  --text: #e0e0f0;
  --text-muted: #999;
  --text-dim: #999;
  --text-faint: #aaa;
  --input-bg: rgba(255,255,255,.06);
  --input-bg-focus: rgba(255,255,255,.08);
  --accent: #8C50C8;
  --accent-dark: #6B2FA8;
  --accent-glow: rgba(140,80,200,.12);
  --title-color: #e0e0f0;
  --btn-secondary-bg: #1a1a2e;
  --btn-secondary-text: #fff;
  --toast-bg: #1a1a2e;
  --toast-text: #fff;
}
/* Light mode overrides */
@media (prefers-color-scheme: light) {
  :root {
    --bg: #f5f5f8;
    --surface: #fff;
    --border: #ddd;
    --border-hover: #bbb;
    --text: #1a1a2e;
    --text-muted: #666;
    --text-dim: #888;
    --text-faint: #aaa;
    --input-bg: rgba(0,0,0,.04);
    --input-bg-focus: rgba(0,0,0,.07);
    --title-color: #1a1a2e;
    --btn-secondary-bg: #1a1a2e;
    --btn-secondary-text: #fff;
    --toast-bg: #1a1a2e;
    --toast-text: #fff;
  }
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{-webkit-text-size-adjust:100%}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:var(--bg);color:var(--text);
  min-height:100vh;min-height:100dvh;
  padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom) 0;
  overscroll-behavior-y:contain;
}
.app{max-width:680px;margin:0 auto;padding:12px 12px 100px}
/* ===== TOPBAR ===== */
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;gap:8px;padding-top:8px}
.topbar h1{font-size:17px;font-weight:700;white-space:nowrap;color:var(--title-color)}
.btn-row{display:flex;gap:6px;flex-wrap:wrap}
button{border:none;cursor:pointer;font-size:14px;font-weight:600;padding:10px 12px;border-radius:12px;transition:all .15s;font-family:inherit;-webkit-appearance:none}
.btn-e{background:var(--accent);color:#fff}
.btn-e.on{background:var(--accent-dark)}
.btn-x{background:var(--btn-secondary-bg);color:var(--btn-secondary-text)}
.btn-x:active{transform:scale(.96)}
/* ===== PREVIEW ===== */
.preview-col{
  margin-bottom:12px;
  position:sticky;top:8px;z-index:50;
  background:var(--bg);padding-bottom:8px;
}
.pw{display:flex;justify-content:center;overflow:hidden;border-radius:10px}
.pw canvas{width:100%;max-width:280px;border-radius:10px;display:block}
/* ===== DESKTOP LAYOUT ===== */
@media (min-width:1024px) {
  .app{max-width:1200px;padding:12px 24px 40px}
  .app-layout{display:flex;gap:24px;align-items:flex-start}
  .preview-col{
    flex:0 0 auto;width:480px;
    top:12px;padding-bottom:0;
  }
  .pw canvas{max-width:100%}
  .editor-col{flex:1;min-width:0}
  .editor-col{display:block !important} /* always visible on desktop */
  #bE{display:none} /* toggle not needed on desktop */
}
/* ===== TABLET (medium screens) ===== */
@media (min-width:600px) and (max-width:1023px) {
  .pw canvas{max-width:360px}
}
/* ===== EDITOR PANELS ===== */
.ed{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:10px}
.ed-t{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.14em;color:var(--text-faint);margin-bottom:12px}
.fld{margin-bottom:14px;position:relative}
.fld:last-child{margin-bottom:0}
.fld label{display:block;font-size:12px;color:var(--text-dim);margin-bottom:5px}
.fld .charcount{float:right;font-size:11px;color:var(--text-faint);font-variant-numeric:tabular-nums}
.fld .charcount.warn{color:#e85d4a}
.fld input,.fld textarea{
  width:100%;background:var(--input-bg);border:1px solid var(--border-hover);
  border-radius:10px;padding:12px 14px;color:var(--text);font-size:16px;font-family:inherit;outline:none;
  -webkit-appearance:none;line-height:1.4;transition:border-color .2s;
}
.fld input:focus,.fld textarea:focus{border-color:rgba(140,100,220,.5);background:var(--input-bg-focus)}
.fld input.over,.fld textarea.over{border-color:#e85d4a;background:rgba(232,93,74,.08)}
.fld textarea{resize:none;overflow:hidden;min-height:48px}
.tog-row{display:flex;align-items:center;gap:12px;margin-bottom:0;padding:6px 0}
.tog-row span{font-size:14px;color:var(--text-muted);font-weight:500}
.tog{
  width:48px;height:28px;border-radius:14px;position:relative;cursor:pointer;
  background:rgba(128,128,128,.2);transition:background .2s;border:none;flex-shrink:0;
}
.tog.on{background:var(--accent)}
.tog::after{content:'';position:absolute;width:22px;height:22px;border-radius:50%;background:#fff;top:3px;left:3px;transition:left .2s}
.tog.on::after{left:23px}
/* ===== IMAGE ZONES ===== */
.img-zones{display:flex;gap:10px;margin-bottom:12px;position:relative}
.img-zone{
  flex:1;border:2px dashed var(--border-hover);border-radius:12px;aspect-ratio:1/1;
  display:flex;align-items:center;justify-content:center;
  position:relative;overflow:hidden;transition:border .2s;min-height:100px;
}
.img-zone.has{border-style:solid;border-color:var(--border-hover)}
.img-zone.dragover{border-color:var(--accent);background:var(--accent-glow)}
.img-zone img{width:100%;height:100%;object-fit:cover;display:block;pointer-events:none}
.img-zone .ph{color:var(--text-faint);font-size:14px;text-align:center;padding:12px;pointer-events:none}
.img-zone input[type=file]{display:none}
.img-zone .rm{
  position:absolute;top:4px;right:4px;width:44px;height:44px;border-radius:50%;
  background:rgba(0,0,0,.7);color:#fff;font-size:20px;display:none;
  align-items:center;justify-content:center;border:none;z-index:3;
}
.img-zone.has .rm{display:flex}
.img-zone .crd{
  position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.65);
  border:none;border-radius:0;color:#fff;font-size:13px;padding:10px 12px;text-align:center;
  font-family:inherit;outline:none;display:none;-webkit-appearance:none;
  letter-spacing:.02em;
}
.img-zone .crd::placeholder{color:rgba(255,255,255,.5)}
.img-zone.has .crd{display:block}
/* ===== SWAP BUTTON ===== */
.swap-btn{
  position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);z-index:5;
  width:44px;height:44px;border-radius:50%;
  background:var(--accent);color:#fff;font-size:18px;
  display:none;align-items:center;justify-content:center;
  border:none;box-shadow:0 2px 8px rgba(0,0,0,.3);
}
.swap-btn.show{display:flex}
/* ===== CROP SLIDERS ===== */
.crop-ctrl{margin-bottom:12px}
.crop-ctrl label{font-size:12px;color:var(--text-dim);display:block;margin-bottom:6px}
.crop-ctrl .sr{display:flex;align-items:center;gap:10px}
.crop-ctrl input[type=range]{
  flex:1;-webkit-appearance:none;height:8px;border-radius:4px;background:var(--border);outline:none;
  touch-action:none;
}
.crop-ctrl input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;width:26px;height:26px;border-radius:50%;background:var(--accent);
  border:2px solid #fff;cursor:pointer;
}
.crop-ctrl .vl{font-size:13px;color:var(--text-muted);min-width:36px;text-align:right;font-variant-numeric:tabular-nums}
/* ===== LAYOUT BUTTONS ===== */
.lbtns{display:flex;gap:6px;margin-bottom:14px}
.lb{
  padding:12px 8px;border-radius:10px;font-size:14px;font-weight:500;
  border:1px solid var(--border-hover);background:transparent;color:var(--text-muted);
  flex:1;text-align:center;transition:all .15s;
}
.lb.on{border-color:var(--accent);color:var(--accent);background:var(--accent-glow)}
.grad-swatch{
  width:36px;height:36px;border-radius:8px;border:2px solid var(--border);
  cursor:pointer;transition:border-color .15s,transform .15s;flex-shrink:0;
}
.grad-swatch:hover{transform:scale(1.08)}
.grad-swatch.on{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-glow)}
/* ===== HINT ===== */
.hint{text-align:center;font-size:12px;color:var(--text-dim);padding:8px 0 20px}
/* ===== TOAST ===== */
.toast{
  position:fixed;bottom:40px;left:50%;transform:translateX(-50%) translateY(80px);
  background:var(--toast-bg);color:var(--toast-text);
  padding:12px 24px;border-radius:12px;font-size:14px;font-weight:600;
  box-shadow:0 4px 20px rgba(0,0,0,.3);
  opacity:0;transition:all .3s ease;z-index:999;pointer-events:none;
  white-space:nowrap;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="app">
<div class="topbar">
  <h1>KI News</h1>
  <div class="btn-row">
    <button class="btn-e on" id="bE" aria-label="Vorschau anzeigen">Vorschau</button>
    <button class="btn-x" id="bX" aria-label="Als JPG speichern">JPG speichern</button>
    <button class="btn-x" id="bC" style="display:none" aria-label="In Zwischenablage kopieren">Kopieren</button>
    <button class="btn-x" id="bS" style="display:none" aria-label="Bild teilen">Teilen</button>
    <button class="btn-x" id="bN" aria-label="Neuen Post beginnen">Neu</button>
  </div>
</div>
<div class="app-layout">
  <!-- ===== PREVIEW ===== -->
  <div class="preview-col">
    <div class="pw"><canvas id="cv" width="1200" height="1500"></canvas></div>
  </div>
  <!-- ===== EDITOR ===== -->
  <div class="editor-col" id="EP">
  <!-- TEXT -->
  <div class="ed">
    <div class="ed-t">Text</div>
    <div class="fld">
      <label>Headline (max 2 Zeilen) <span class="charcount" id="hlCount"></span></label>
      <textarea id="inHL" rows="1">Per ChatGPT das eigene Haustier zum Menschen machen</textarea>
    </div>
    <div class="tog-row">
      <button class="tog" id="togCaps" role="switch" aria-checked="false" aria-label="Grossbuchstaben umschalten"></button>
      <span>GROSSBUCHSTABEN</span>
    </div>
    <div class="fld">
      <label>Untertitel <span class="charcount" id="subCount"></span></label>
      <input id="inSub" type="text" placeholder="optional">
    </div>
    <div class="fld">
      <label>Datum</label>
      <input id="inDate" type="text">
    </div>
  </div>
  <!-- LAYOUT -->
  <div class="ed">
    <div class="ed-t">Layout</div>
    <div class="lbtns" style="margin-bottom:8px">
      <button class="lb on" id="lbOne" aria-label="Layout: 1 Bild">1 Bild</button>
      <button class="lb" id="lbTwo" aria-label="Layout: 2 Bilder">2 Bilder</button>
      <button class="lb" id="lbNone" aria-label="Layout: Kein Bild">Kein Bild</button>
    </div>
    <div class="lbtns">
      <button class="lb fmt on" data-fmt="4:5" aria-label="Format 4:5">4:5</button>
      <button class="lb fmt" data-fmt="1:1" aria-label="Format 1:1">1:1</button>
      <button class="lb fmt" data-fmt="16:9" aria-label="Format 16:9">16:9</button>
      <button class="lb fmt" data-fmt="9:16" aria-label="Format 9:16">9:16</button>
    </div>
    <div class="lbtns" id="gradBtns"></div>
  </div>
  <!-- IMAGES -->
  <div class="ed" id="imgEd">
    <div class="ed-t">Bilder</div>
    <div class="img-zones">
      <div class="img-zone" id="z0" tabindex="0" role="button" aria-label="Bild 1 hochladen">
        <input type="file" accept="image/*" id="f0">
        <img id="pv0" style="display:none" alt="Vorschau Bild 1">
        <div class="ph" id="ph0">Bild 1</div>
        <button class="rm" id="rm0" aria-label="Bild 1 entfernen">&times;</button>
        <input class="crd" id="cr0" placeholder="&copy; Credit" aria-label="Credit fuer Bild 1">
      </div>
      <button class="swap-btn" id="swapBtn" aria-label="Bilder tauschen">&#8644;</button>
      <div class="img-zone" id="z1" style="display:none" tabindex="0" role="button" aria-label="Bild 2 hochladen">
        <input type="file" accept="image/*" id="f1">
        <img id="pv1" style="display:none" alt="Vorschau Bild 2">
        <div class="ph" id="ph1">Bild 2</div>
        <button class="rm" id="rm1" aria-label="Bild 2 entfernen">&times;</button>
        <input class="crd" id="cr1" placeholder="&copy; Credit" aria-label="Credit fuer Bild 2">
      </div>
    </div>
    <div class="crop-ctrl" id="cc0" style="display:none">
      <label>Bildausschnitt 1</label>
      <div class="sr">
        <input type="range" id="sl0" min="0" max="100" value="50" aria-label="Bildausschnitt 1">
        <span class="vl" id="vl0">50%</span>
      </div>
    </div>
    <div class="crop-ctrl" id="cc1" style="display:none">
      <label>Bildausschnitt 2</label>
      <div class="sr">
        <input type="range" id="sl1" min="0" max="100" value="50" aria-label="Bildausschnitt 2">
        <span class="vl" id="vl1">50%</span>
      </div>
    </div>
  </div>
  </div><!-- /editor-col -->
</div><!-- /app-layout -->
<div class="hint" id="hint">4:5 Format &middot; 1200 &times; 1500 px</div>
</div>
<!-- TOAST -->
<div class="toast" id="toast"></div>

// ===== CHARACTER LIMITS =====
var LIMITS = {
  none: { hl: [30, 40], sub: [44, 54] },
  one:  { hl: [48, 58], sub: [66, 76] },
  two:  { hl: [48, 58], sub: [66, 76] }
};
function hlLimits() { return LIMITS[S.layout].hl; }
function subLimits() { return LIMITS[S.layout].sub; }
// ===== LOCALSTORAGE =====
var STORE_KEY = 'ki-news-state';
function saveState() {
  try {
    localStorage.setItem(STORE_KEY, JSON.stringify({
      hlLines: S.hlLines, subText: S.subText, dateText: S.dateText,
      layout: S.layout, format: S.format, allCaps: S.allCaps, creds: S.creds,
      gradient: activeGradient
    }));
  } catch(e) {}
}
function loadState() {
  try {
    var raw = localStorage.getItem(STORE_KEY);
    if (!raw) return;
    var saved = JSON.parse(raw);
    if (saved.hlLines) S.hlLines = saved.hlLines;
    if (saved.subText != null) S.subText = saved.subText;
    if (saved.dateText) S.dateText = saved.dateText;
    if (saved.layout) S.layout = saved.layout;
    if (saved.format && FORMATS[saved.format]) S.format = saved.format;
    if (saved.allCaps != null) S.allCaps = saved.allCaps;
    if (saved.creds) S.creds = saved.creds;
    if (saved.gradient && GRADIENTS[saved.gradient]) activeGradient = saved.gradient;
  } catch(e) {}
}
loadState();
// Apply loaded format
if (S.format !== '4:5') {
  var f = FORMATS[S.format];
  W = f.w; H = f.h;
  cv.width = W; cv.height = H;
  rebuildGradient();
}
// ===== RAF THROTTLE =====
var rafPending = false;
function scheduleDraw() {
  if (rafPending) return;
  rafPending = true;
  requestAnimationFrame(function() {
    rafPending = false;
    draw();
  });
}
// ===== TOAST =====
var toastTimer = null;
function showToast(msg) {
  $toast.textContent = msg;
  $toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function() { $toast.classList.remove('show'); }, 2000);
}
// ===== HELPERS =====
function autoSize(el) {
  if (el.tagName !== 'TEXTAREA') return;
  el.style.height = 'auto';
  el.style.height = el.scrollHeight + 'px';
}
function updateCharCount(el, $counter, soft, hard) {
  el.maxLength = hard;
  var len = el.value.length;
  $counter.textContent = len + '/' + soft;
  $counter.classList.toggle('warn', len > soft);
  el.classList.toggle('over', len > soft);
}
function refreshCounts() {
  var hl = hlLimits(), sub = subLimits();
  updateCharCount($hl, $hlCount, hl[0], hl[1]);
  updateCharCount($sub, $subCount, sub[0], sub[1]);
}
function revokeBlob(i) {
  if (S.blobs[i]) { URL.revokeObjectURL(S.blobs[i]); S.blobs[i] = null; }
}
// ===== WORD WRAP =====
function wrapLine(text, fs, maxWidth) {
  cx.font = 'bold ' + fs + 'px Festivo, serif';
  if (cx.measureText(text).width <= maxWidth) return [text];
  var words = text.split(' ');
  var lines = [], cur = '';
  for (var w = 0; w < words.length; w++) {
    var word = words[w];
    // Break single words that exceed maxWidth
    if (cx.measureText(word).width > maxWidth) {
      if (cur) { lines.push(cur); cur = ''; }
      var chars = '';
      for (var c = 0; c < word.length; c++) {
        var next = chars + word[c];
        if (cx.measureText(next).width > maxWidth && chars) {
          lines.push(chars); chars = word[c];
        } else { chars = next; }
      }
      cur = chars;
      continue;
    }
    var test = cur ? cur + ' ' + word : word;
    if (cx.measureText(test).width > maxWidth && cur) {
      lines.push(cur); cur = word;
    } else { cur = test; }
  }
  if (cur) lines.push(cur);
  return lines;
}
// ===== UI SYNC =====
function updateCropVis() {
  $cc[0].style.display = (S.layout !== 'none' && S.imgs[0]) ? 'block' : 'none';
  $cc[1].style.display = (S.layout === 'two' && S.imgs[1]) ? 'block' : 'none';
}
function updateSwapBtn() {
  $swapBtn.classList.toggle('show', !!(S.layout === 'two' && S.imgs[0] && S.imgs[1]));
}
function renderUI() {
  for (var i = 0; i < 2; i++) {
    if (S.imgs[i]) {
      $pv[i].src = S.blobs[i] || S.imgs[i].src;
      $pv[i].style.display = 'block';
      $ph[i].style.display = 'none';
      $z[i].classList.add('has');
    } else {
      $pv[i].style.display = 'none';
      $ph[i].style.display = 'block';
      $z[i].classList.remove('has');
    }
    $cr[i].value = S.creds[i];
    $sl[i].value = S.crop[i];
    $vl[i].textContent = S.crop[i] + '%';
  }
  updateCropVis();
  updateSwapBtn();
  scheduleDraw();
}

function isDesktop() { return window.innerWidth >= 1024; }
$bE.addEventListener('click', function() {
  if (isDesktop()) return; // no toggle needed on desktop
  S.editing = !S.editing;
  $EP.style.display = S.editing ? 'block' : 'none';
  this.textContent = S.editing ? 'Vorschau' : 'Bearbeiten';
  this.setAttribute('aria-label', S.editing ? 'Vorschau anzeigen' : 'Editor oeffnen');
  this.classList.toggle('on', S.editing);
  if (!S.editing) {
    window.scrollTo({ top: 0, behavior: 'smooth' });
    scheduleDraw();
  } else {
    autoSize($hl);
  }
});

$bN.addEventListener('click', function() {

  S.imgs = [null, null]; S.blobs = [null, null]; S.creds = ['', ''];
  S.crop = [50, 50]; S.allCaps = false;

  var m = ['Januar','Februar','M\u00e4rz','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];

// Export (async toBlob)
$bX.addEventListener('click', function() {
  draw();
  var btn = this;
  btn.disabled = true; btn.textContent = '\u2026';
  cv.toBlob(function(blob) {
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.download = 'ki-news-' + new Date().toISOString().slice(0, 10) + '.jpg';
    a.href = url;
    a.click();
    setTimeout(function() { URL.revokeObjectURL(url); }, 1000);
    btn.disabled = false; btn.textContent = 'JPG speichern';
    showToast('\u2713 JPG gespeichert');
  }, 'image/jpeg', 0.95);
});
// Web Share API
$bS.addEventListener('click', function() {
  draw();
  var btn = this;
  btn.disabled = true; btn.textContent = '\u2026';
  cv.toBlob(function(blob) {
    var file = new File([blob], 'ki-news-' + new Date().toISOString().slice(0, 10) + '.jpg', { type: 'image/jpeg' });
    navigator.share({ files: [file] }).catch(function() {}).finally(function() {
      btn.disabled = false; btn.textContent = 'Teilen';

  cv.width = W; cv.height = H;
  rebuildGradient();
  for (var i = 0; i < $fmtBtns.length; i++) {

var $gradBtns = document.getElementById('gradBtns');
var gradSwatches = {};
Object.keys(GRADIENTS).forEach(function(key) {
  var g = GRADIENTS[key];
  var btn = document.createElement('button');
  btn.className = 'grad-swatch' + (key === activeGradient ? ' on' : '');
  btn.setAttribute('aria-label', 'Farbverlauf: ' + g.label);
  btn.title = g.label;
  // Draw mini gradient
  var cssStops = g.stops.map(function(s) { return s[1] + ' ' + (s[0] * 100) + '%'; }).join(',');
  btn.style.background = 'linear-gradient(180deg,' + cssStops + ')';
  btn.addEventListener('click', function() { setGradient(key); });
  $gradBtns.appendChild(btn);
  gradSwatches[key] = btn;
});

  activeGradient = key;
  Object.keys(gradSwatches).forEach(function(k) {
    gradSwatches[k].classList.toggle('on', k === key);
  });
  rebuildGradient();
  saveState();
  scheduleDraw();

$swapBtn.addEventListener('click', function(e) {
  e.stopPropagation();
  var t;
  t = S.imgs[0];  S.imgs[0]  = S.imgs[1];  S.imgs[1]  = t;
  t = S.blobs[0]; S.blobs[0] = S.blobs[1]; S.blobs[1] = t;
  t = S.creds[0]; S.creds[0] = S.creds[1]; S.creds[1] = t;
  t = S.crop[0];  S.crop[0]  = S.crop[1];  S.crop[1]  = t;
  saveState();

// Image loading
function loadImageFile(i, file) {
  if (!file || !file.type.match('image.*')) return;
  revokeBlob(i);
  var blobUrl = URL.createObjectURL(file);
  var im = new Image();
  im.onload = function() {
    S.imgs[i] = im;
    S.blobs[i] = blobUrl;
    S.crop[i] = 50;
    renderUI();
  };
  im.onerror = function() {
    URL.revokeObjectURL(blobUrl);
    showToast('\u26a0 Bild konnte nicht geladen werden');
    $f[i].value = '';
  };
  im.src = blobUrl;
}
// Image zones + crop sliders + credit inputs
[0, 1].forEach(function(i) {
  function openFilePicker() {
    if (!S.imgs[i]) $f[i].click();
  }
  $z[i].addEventListener('click', function(e) {
    if (e.target === $rm[i] || e.target.classList.contains('crd')) return;
    openFilePicker();
  });
  // Keyboard support for image zones
  $z[i].addEventListener('keydown', function(e) {
    if (e.key === 'Enter' || e.key === ' ') {
      e.preventDefault();
      openFilePicker();
    }
  });
  $f[i].addEventListener('change', function() {
    loadImageFile(i, this.files[0]);
  });
  // Drag & Drop
  $z[i].addEventListener('dragover', function(e) {
    e.preventDefault(); e.stopPropagation();
    this.classList.add('dragover');
  });
  $z[i].addEventListener('dragleave', function(e) {
    e.preventDefault(); e.stopPropagation();
    this.classList.remove('dragover');
  });
  $z[i].addEventListener('drop', function(e) {
    e.preventDefault(); e.stopPropagation();
    this.classList.remove('dragover');
    var file = e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files[0];
    if (file) loadImageFile(i, file);
  });
  // Remove image
  $rm[i].addEventListener('click', function(e) {
    e.stopPropagation();
    revokeBlob(i);
    S.imgs[i] = null; S.creds[i] = ''; S.crop[i] = 50;
    $f[i].value = '';
    saveState();
    renderUI();
  });
  // Crop slider
  $sl[i].addEventListener('input', function() {
    S.crop[i] = +this.value;
    $vl[i].textContent = this.value + '%';
    scheduleDraw();
  });
  // Credit input
  $cr[i].addEventListener('input', function() {
    S.creds[i] = this.value;
    saveState();
    scheduleDraw();
  });
});
// ===== DRAW HELPERS =====
function prepareText(maxW) {
  var headlineText = S.hlLines.join('\n');
  if (S.allCaps) headlineText = headlineText.toUpperCase();
  var isNone = (S.layout === 'none');
  var hlFS = isNone ? (S.hlLines.length > 1 ? 190 : 200) : (S.hlLines.length > 1 ? 120 : 130);
  var subFS = isNone ? 90 : 60;
  // Auto-shrink headline
  var rawLines = headlineText.split('\n');
  cx.font = 'bold ' + hlFS + 'px Festivo, serif';
  var worstRatio = 1;
  for (var k = 0; k < rawLines.length; k++) {
    var mw = cx.measureText(rawLines[k]).width;
    if (mw > maxW) {
      var ratio = maxW / mw;
      if (ratio < worstRatio) worstRatio = ratio;
    }
  }
  if (worstRatio < 1) {
    hlFS = Math.max(Math.floor(hlFS * worstRatio), HL_MIN_FS);
  }
  // Word-wrap headline
  var hlArr = [];
  for (var r = 0; r < rawLines.length; r++) {
    var wrapped = wrapLine(rawLines[r], hlFS, maxW);
    for (var wr = 0; wr < wrapped.length && hlArr.length < HL_MAX_LINES; wr++) {
      hlArr.push(wrapped[wr]);
    }
  }
  // Word-wrap subtitle
  var subArr = [];
  if (S.subText) {
    subArr = wrapLine(S.subText, subFS, maxW);
    if (subArr.length > SUB_MAX_LINES) subArr = subArr.slice(0, SUB_MAX_LINES);
  }
  return { hlArr: hlArr, hlFS: hlFS, subArr: subArr, subFS: subFS, isNone: isNone };
}
function drawText(t, maxW) {
  var hlLineH = Math.round(t.hlFS * HL_LINE_H_FACTOR);
  var hlBlockH = t.hlArr.length * hlLineH;
  var subLineH = Math.round(t.subFS * SUB_LINE_H_FACTOR);
  var subBlockH = t.subArr.length > 0 ? t.subArr.length * subLineH : 0;
  var subGap = t.isNone ? 20 : 14;
  // Y position
  var curY;
  if (t.isNone) {
    var availH = H - TOP_PAD - FOOTER_H;
    var totalH = hlBlockH + (subBlockH > 0 ? subGap + subBlockH : 0);
    curY = TOP_PAD + Math.round((availH - totalH) / 2);
  } else {
    curY = TOP_PAD;
  }
  // Headline
  cx.font = 'bold ' + t.hlFS + 'px Festivo, serif';
  cx.fillStyle = '#ffffff';
  cx.textBaseline = 'top';
  for (var li = 0; li < t.hlArr.length; li++) {
    cx.fillText(t.hlArr[li], MX, curY + li * hlLineH);
  }
  curY += hlBlockH;
  // Subtitle
  if (t.subArr.length > 0) {
    curY += subGap;
    cx.font = '700 ' + t.subFS + 'px Festivo, serif';
    cx.fillStyle = 'rgba(210,225,240,0.9)';
    for (var sj = 0; sj < t.subArr.length; sj++) {
      cx.fillText(t.subArr[sj], MX, curY + sj * subLineH);
    }
    curY += t.subArr.length * subLineH;
  }
  return curY;
}
function drawImages(curY) {
  var imgTop = curY + IMG_TOP_GAP;
  var imgH = Math.max(H - FOOTER_H - imgTop, IMG_MIN_H);
  if (S.layout === 'two') {
    var imgW = Math.round((W - MX * 2 - IMG_GAP) / 2);
    drawCroppedImage(0, MX, imgTop, imgW, imgH);
    drawCroppedImage(1, MX + imgW + IMG_GAP, imgTop, imgW, imgH);
  } else {
    drawCroppedImage(0, MX, imgTop, W - MX * 2, imgH);
  }
}
function drawFooter() {
  cx.textBaseline = 'bottom';
  cx.font = '500 ' + FOOTER_FS + 'px Festivo, serif';
  cx.fillStyle = '#ffffff';
  cx.textAlign = 'center';
  cx.fillText('vandieken.com', W / 2, H - FOOTER_BOTTOM);
  cx.textAlign = 'left';
  cx.fillText(S.dateText, MX, H - FOOTER_BOTTOM);
  if (LOGO.complete && LOGO.naturalWidth > 0) {
    var lw = LOGO_H * (LOGO.naturalWidth / LOGO.naturalHeight);
    cx.globalAlpha = 0.85;
    cx.drawImage(LOGO, W - MX - lw, H - FOOTER_BOTTOM - LOGO_H + 6, lw, LOGO_H);
    cx.globalAlpha = 1;
  }
  cx.textBaseline = 'alphabetic';
  cx.textAlign = 'left';
}
// ===== DRAW =====
function draw() {
  cx.drawImage(gradCV, 0, 0, 1, H, 0, 0, W, H);
  var maxW = W - MX * 2;
  var t = prepareText(maxW);
  var curY = drawText(t, maxW);
  if (!t.isNone) drawImages(curY);
  drawFooter();
}
// ===== DRAW CROPPED IMAGE =====
function drawCroppedImage(idx, dx, dy, dw, dh) {
  var img = S.imgs[idx];
  cx.save();
  if (!img) {
    cx.fillStyle = '#f0f0f0';
    cx.fillRect(dx, dy, dw, dh);
    cx.fillStyle = '#bbb';
    cx.font = '600 28px ' + SYS_FONT;
    cx.textAlign = 'center';
    cx.textBaseline = 'middle';
    cx.fillText('Bild ' + (idx + 1), dx + dw / 2, dy + dh / 2);
    cx.restore();
    return;
  }
  var iw = img.naturalWidth, ih = img.naturalHeight;
  var destR = dw / dh, srcR = iw / ih;
  var sx, sy, sw, sh;
  if (srcR > destR) {
    sh = ih; sw = ih * destR; sy = 0;
    sx = (iw - sw) * (S.crop[idx] / 100);
  } else {
    sw = iw; sh = iw / destR; sx = 0;
    sy = (ih - sh) * (S.crop[idx] / 100);
  }
  cx.drawImage(img, sx, sy, sw, sh, dx, dy, dw, dh);
  if (S.creds[idx]) {
    cx.fillStyle = 'rgba(0,0,0,0.45)';
    cx.fillRect(dx, dy + dh - CREDIT_BAR_H, dw, CREDIT_BAR_H);
    cx.font = '500 20px ' + SYS_FONT;
    cx.fillStyle = 'rgba(255,255,255,0.85)';
    cx.textAlign = 'center';
    cx.textBaseline = 'middle';
    cx.fillText(S.creds[idx], dx + dw / 2, dy + dh - CREDIT_BAR_H / 2);
  }
  cx.restore();
}
// ===== INIT =====
function init() {
  if (document.fonts && !document.fonts.check('12px Festivo')) {
    showToast('\u26a0 Font l\u00e4dt\u2026');
  }
  $hl.value = S.hlLines.join('\n');
  $sub.value = S.subText;
  $date.value = S.dateText;
  $togCaps.classList.toggle('on', S.allCaps);
  $togCaps.setAttribute('aria-checked', String(S.allCaps));
  setLayout(S.layout);
  setFormat(S.format);
  setGradient(activeGradient);
  // On desktop: always show editor; on mobile: respect S.editing
  if (isDesktop()) {
    $EP.style.display = 'block';
    $bE.style.display = 'none';
  } else {
    $EP.style.display = S.editing ? 'block' : 'none';
  }
  autoSize($hl);
  draw();
}
var fontLoaded = false;
if (document.fonts && document.fonts.load) {
  // Explicitly trigger font download — fonts.ready alone resolves
  // immediately when no DOM element references the font (Canvas-only usage)
  document.fonts.load('bold 48px Festivo').then(function() {
    fontLoaded = true;
    init();
  }).catch(function() {
    fontLoaded = true;
    showToast('\u26a0 Font nicht verf\u00fcgbar \u2013 Fallback aktiv');
    init();
  });
  // Fallback: if font takes too long, init anyway after 3s
  setTimeout(function() {
    if (!fontLoaded) {
      fontLoaded = true;
      showToast('\u26a0 Font nicht verf\u00fcgbar \u2013 Fallback aktiv');
      init();
    }
  }, 3000);
} else {
  window.addEventListener('load', init);
}
window.addEventListener('resize', function() {
  // Ensure editor visibility matches layout mode
  if (isDesktop()) {
    $EP.style.display = 'block';
  }
  scheduleDraw();
});
})();
</script>
