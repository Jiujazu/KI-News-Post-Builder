<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="KI News">
<meta name="theme-color" content="#0a0a1a">
<title>KI News Post Generator</title>
<style>
@font-face {
  font-family:'Festivo';
  src:url('FestivoLC-Basic.otf') format('opentype');
  font-weight:normal;font-style:normal;font-display:swap;
}
/* ===== ADAPTIVE THEME via CSS Variables ===== */
:root {
  --bg: #0a0a1a;
  --surface: #111125;
  --border: #1e1e3a;
  --border-hover: #2a2a4a;
  --text: #e0e0f0;
  --text-muted: #999;
  --text-dim: #777;
  --text-faint: #aaa;
  --input-bg: rgba(255,255,255,.06);
  --input-bg-focus: rgba(255,255,255,.08);
  --accent: #8C50C8;
  --accent-dark: #6B2FA8;
  --accent-glow: rgba(140,80,200,.12);
  --radius-lg: 14px;
  --radius-md: 10px;
  --title-color: #e0e0f0;
  --btn-secondary-bg: #1a1a2e;
  --btn-secondary-text: #fff;
  --toast-bg: #1a1a2e;
  --toast-text: #fff;
}
/* Light mode overrides */
@media (prefers-color-scheme: light) {
  :root {
    --bg: #f5f5f8;
    --surface: #fff;
    --border: #ddd;
    --border-hover: #bbb;
    --text: #1a1a2e;
    --text-muted: #666;
    --text-dim: #999;
    --text-faint: #aaa;
    --input-bg: rgba(0,0,0,.04);
    --input-bg-focus: rgba(0,0,0,.07);
    --title-color: #1a1a2e;
    --btn-secondary-bg: #e8e8ee;
    --btn-secondary-text: #1a1a2e;
    --toast-bg: #333;
    --toast-text: #fff;
  }
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{-webkit-text-size-adjust:100%}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:var(--bg);color:var(--text);
  min-height:100vh;min-height:100dvh;
  padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom) 0;
  overscroll-behavior-y:contain;
}
.app{max-width:680px;margin:0 auto;padding:12px 12px 100px}
/* ===== TOPBAR ===== */
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;gap:8px;padding-top:8px}
.topbar h1{font-size:17px;font-weight:700;white-space:nowrap;color:var(--title-color)}
.btn-row{display:flex;gap:6px;flex-wrap:wrap}
button{border:none;cursor:pointer;font-size:14px;font-weight:600;padding:10px 12px;border-radius:var(--radius-md);transition:all .15s;font-family:inherit;-webkit-appearance:none}
.seg-ctrl{display:inline-flex;background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.seg{padding:8px 14px;font-size:13px;font-weight:600;border:none;background:transparent;color:var(--text-muted);cursor:pointer;font-family:inherit;transition:all .15s}
.seg.active{background:var(--accent);color:#fff}
.btn-x{background:var(--btn-secondary-bg);color:var(--btn-secondary-text)}
.btn-x:active{transform:scale(.96)}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:active{transform:scale(.96);background:var(--accent-dark)}
.btn-success{background:#2ea043 !important;color:#fff !important;pointer-events:none}
.btn-success-outline{border-color:#2ea043 !important;color:#2ea043 !important;pointer-events:none}
.btn-danger{background:transparent;color:var(--text-muted);border:1px solid var(--border)}
.btn-danger:active{transform:scale(.96)}
/* ===== PREVIEW ===== */
.preview-col{
  margin-bottom:12px;
  position:sticky;top:8px;z-index:50;
  background:var(--bg);padding-bottom:8px;
}
.pw{display:flex;justify-content:center;overflow:hidden;border-radius:var(--radius-md)}
.pw canvas{width:100%;max-width:280px;border-radius:var(--radius-md);display:block}
/* ===== DESKTOP LAYOUT ===== */
@media (min-width:1024px) {
  .app{max-width:1200px;padding:12px 24px 40px}
  .app-layout{display:flex;gap:24px;align-items:flex-start}
  .preview-col{
    flex:0 0 auto;width:480px;
    top:12px;padding-bottom:0;
  }
  .pw canvas{max-width:100%}
  .editor-col{flex:1;min-width:0}
  .editor-col{display:block !important} /* always visible on desktop */
  #segCtrl{display:none} /* toggle not needed on desktop */
}
/* ===== TABLET (medium screens) ===== */
@media (min-width:600px) and (max-width:1023px) {
  .pw canvas{max-width:360px}
}
/* ===== EDITOR PANELS ===== */
.ed{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;margin-bottom:10px}
.ed-t{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--text-muted);margin-bottom:14px}
.fld{margin-bottom:14px;position:relative}
.fld:last-child{margin-bottom:0}
.fld label{display:block;font-size:12px;color:var(--text-dim);margin-bottom:5px}
.fld .charcount{float:right;font-size:11px;color:var(--text-faint);font-variant-numeric:tabular-nums}
.fld .charcount.warn{color:#e85d4a}
.fld input,.fld textarea{
  width:100%;background:var(--input-bg);border:1px solid var(--border-hover);
  border-radius:var(--radius-md);padding:12px 14px;color:var(--text);font-size:16px;font-family:inherit;outline:none;
  -webkit-appearance:none;line-height:1.4;transition:border-color .2s;
}
.fld input:focus,.fld textarea:focus{border-color:rgba(140,100,220,.5);background:var(--input-bg-focus)}
.fld input.over,.fld textarea.over{border-color:#e85d4a;background:rgba(232,93,74,.08)}
.fld textarea{resize:none;overflow:hidden;min-height:48px}
.tog-row{display:flex;align-items:center;gap:12px;margin-bottom:0;padding:6px 0}
.tog-row span{font-size:14px;color:var(--text-muted);font-weight:500}
.tog{
  width:48px;height:28px;border-radius:14px;position:relative;cursor:pointer;
  background:rgba(128,128,128,.2);transition:background .2s;border:none;flex-shrink:0;
}
.tog.on{background:var(--accent)}
.tog::after{content:'';position:absolute;width:22px;height:22px;border-radius:50%;background:#fff;top:3px;left:3px;transition:left .2s}
.tog.on::after{left:23px}
/* ===== IMAGE ZONES ===== */
.img-zones{display:flex;gap:10px;margin-bottom:12px;position:relative}
.img-zone{
  flex:1;border:2px dashed var(--border-hover);border-radius:var(--radius-md);aspect-ratio:1/1;
  display:flex;align-items:center;justify-content:center;
  position:relative;overflow:hidden;transition:border .2s;min-height:100px;
}
.img-zone.has{border-style:solid;border-color:var(--border-hover)}
.img-zone.dragover{border-color:var(--accent);background:var(--accent-glow)}
.img-zone img{width:100%;height:100%;object-fit:cover;display:block;pointer-events:none}
.img-zone .ph{color:var(--text-faint);font-size:14px;text-align:center;padding:12px;pointer-events:none}
.img-zone input[type=file]{display:none}
.img-zone .rm{
  position:absolute;top:4px;right:4px;width:44px;height:44px;border-radius:50%;
  background:rgba(0,0,0,.7);color:#fff;font-size:20px;display:none;
  align-items:center;justify-content:center;border:none;z-index:3;
  transition:background .15s,transform .15s;
}
.img-zone .rm:hover,.img-zone .rm:focus-visible{background:rgba(220,50,50,.9);transform:scale(1.08)}
.img-zone.has .rm{display:flex}
.img-zone .crd{
  position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.65);
  border:none;border-radius:0;color:#fff;font-size:13px;padding:10px 12px;text-align:center;
  font-family:inherit;outline:none;display:none;-webkit-appearance:none;
  letter-spacing:.02em;
}
.img-zone .crd::placeholder{color:rgba(255,255,255,.5)}
.img-zone.has .crd{display:block}
/* ===== SWAP BUTTON ===== */
.swap-btn{
  position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);z-index:5;
  width:44px;height:44px;border-radius:50%;
  background:var(--accent);color:#fff;font-size:18px;
  display:none;align-items:center;justify-content:center;
  border:none;box-shadow:0 2px 8px rgba(0,0,0,.3);
}
.swap-btn.show{display:flex}
/* ===== CROP SLIDERS ===== */
.crop-ctrl{margin-bottom:12px}
.crop-ctrl label{font-size:12px;color:var(--text-dim);display:block;margin-bottom:6px}
.crop-ctrl .sr{display:flex;align-items:center;gap:10px}
.crop-ctrl input[type=range]{
  flex:1;-webkit-appearance:none;height:8px;border-radius:4px;background:var(--border);outline:none;
  touch-action:none;
}
.crop-ctrl input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;width:26px;height:26px;border-radius:50%;background:var(--accent);
  border:2px solid #fff;cursor:pointer;
}
.crop-ctrl .vl{font-size:13px;color:var(--text-muted);min-width:36px;text-align:right;font-variant-numeric:tabular-nums}
/* ===== LAYOUT BUTTONS ===== */
.lbtns{display:flex;gap:6px;margin-bottom:14px}
.lb{
  padding:12px 8px;border-radius:var(--radius-md);font-size:14px;font-weight:500;
  border:1px solid var(--border-hover);background:transparent;color:var(--text-muted);
  flex:1;text-align:center;transition:all .15s;
}
.lb.on{border-color:var(--accent);color:var(--accent);background:var(--accent-glow)}
/* ===== HINT ===== */
.hint{text-align:center;font-size:12px;color:var(--text-dim);padding:8px 0 20px}
/* ===== TOAST ===== */
.toast{
  position:fixed;bottom:40px;left:50%;transform:translateX(-50%) translateY(80px);
  background:var(--toast-bg);color:var(--toast-text);
  padding:12px 24px;border-radius:var(--radius-md);font-size:14px;font-weight:600;
  box-shadow:0 4px 20px rgba(0,0,0,.3);
  opacity:0;transition:all .3s ease;z-index:999;pointer-events:none;
  white-space:nowrap;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
/* ===== HISTORY DRAWER ===== */
.hist-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:900;
  opacity:0;pointer-events:none;transition:opacity .25s;
}
.hist-overlay.open{opacity:1;pointer-events:auto}
.hist-drawer{
  position:fixed;top:0;right:0;bottom:0;width:min(400px,100vw);z-index:901;
  background:var(--bg);border-left:1px solid var(--border);
  transform:translateX(100%);transition:transform .25s ease;
  display:flex;flex-direction:column;overflow:hidden;
}
.hist-drawer.open{transform:translateX(0)}
.hist-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 16px 12px;border-bottom:1px solid var(--border);flex-shrink:0;
}
.hist-header h2{font-size:17px;font-weight:700;color:var(--title-color);margin:0}
.hist-close{
  width:40px;height:40px;border-radius:50%;background:var(--btn-secondary-bg);color:var(--text);
  font-size:20px;display:flex;align-items:center;justify-content:center;border:none;cursor:pointer;
}
.hist-close:active{transform:scale(.95)}
.hist-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px}
.hist-empty{text-align:center;color:var(--text-muted);font-size:14px;padding:40px 16px;line-height:1.5}
.hist-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px}
.hist-item{
  position:relative;border-radius:var(--radius-md);overflow:hidden;cursor:pointer;
  border:1px solid var(--border);transition:border-color .15s,transform .1s;
  background:var(--surface);
}
.hist-item:active{transform:scale(.97)}
.hist-item:hover{border-color:var(--accent)}
.hist-item img{width:100%;aspect-ratio:4/5;object-fit:cover;display:block}
.hist-item-info{padding:8px 10px}
.hist-item-title{font-size:12px;font-weight:600;color:var(--text);line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.hist-item-date{font-size:11px;color:var(--text-muted);margin-top:3px}
.hist-item .hist-del{
  position:absolute;top:4px;right:4px;width:32px;height:32px;border-radius:50%;
  background:rgba(0,0,0,.7);color:#fff;font-size:16px;
  display:flex;align-items:center;justify-content:center;border:none;cursor:pointer;
  opacity:0;transition:opacity .15s;z-index:2;
}
.hist-item:hover .hist-del,.hist-item:focus-within .hist-del{opacity:1}
@media (hover:none){.hist-item .hist-del{opacity:1}}
.hist-del:hover,.hist-del:focus-visible{background:rgba(220,50,50,.9)}
</style>
</head>
<body>
<div class="app">
<div class="topbar">
  <h1>KI News</h1>
  <div class="btn-row">
    <div class="seg-ctrl" id="segCtrl">
      <button class="seg active" id="segEdit" aria-label="Editor anzeigen">Editor</button>
      <button class="seg" id="segPreview" aria-label="Vorschau anzeigen">Vorschau</button>
    </div>
    <button class="btn-primary" id="bX" aria-label="Als JPG speichern">JPG speichern</button>
    <button class="btn-x" id="bC" style="display:none" aria-label="In Zwischenablage kopieren">Kopieren</button>
    <button class="btn-x" id="bS" style="display:none" aria-label="Bild teilen">Teilen</button>
    <button class="btn-x" id="bA" aria-label="Post archivieren">Archivieren</button>
    <button class="btn-x" id="bH" aria-label="Archiv öffnen">Archiv</button>
    <button class="btn-danger" id="bN" aria-label="Neuen Post beginnen">Neu</button>
  </div>
</div>
<div class="app-layout">
  <!-- ===== PREVIEW ===== -->
  <div class="preview-col">
    <div class="pw"><canvas id="cv" width="1200" height="1500"></canvas></div>
  </div>
  <!-- ===== EDITOR ===== -->
  <div class="editor-col" id="EP">
  <!-- TEXT -->
  <div class="ed">
    <div class="ed-t">Text</div>
    <div class="fld">
      <label>Headline (Enter = Umbruch) <span class="charcount" id="hlCount"></span></label>
      <textarea id="inHL" rows="1">Per ChatGPT das eigene Haustier zum Menschen machen</textarea>
    </div>
    <div class="tog-row">
      <button class="tog" id="togCaps" role="switch" aria-checked="false" aria-label="Grossbuchstaben umschalten"></button>
      <span>GROSSBUCHSTABEN</span>
    </div>
    <div class="fld">
      <label>Untertitel (Enter = Umbruch) <span class="charcount" id="subCount"></span></label>
      <textarea id="inSub" rows="1" placeholder="optional"></textarea>
    </div>
    <div class="fld">
      <label>Datum</label>
      <input id="inDate" type="text" placeholder="z.B. 2. M\u00e4rz 2026">
    </div>
  </div>
  <!-- LAYOUT -->
  <div class="ed">
    <div class="ed-t">Layout</div>
    <div class="lbtns" style="margin-bottom:8px">
      <button class="lb on" id="lbOne" aria-label="Layout: 1 Bild">1 Bild</button>
      <button class="lb" id="lbTwo" aria-label="Layout: 2 Bilder">2 Bilder</button>
      <button class="lb" id="lbNone" aria-label="Layout: Kein Bild">Kein Bild</button>
    </div>
    <label style="display:block;font-size:12px;color:var(--text-dim);margin-bottom:5px">Format</label>
    <div class="lbtns">
      <button class="lb fmt on" data-fmt="4:5" aria-label="Format 4:5" title="Instagram Post">4:5</button>
      <button class="lb fmt" data-fmt="1:1" aria-label="Format 1:1" title="Quadratisch">1:1</button>
      <button class="lb fmt" data-fmt="16:9" aria-label="Format 16:9" title="YouTube / Landscape">16:9</button>
      <button class="lb fmt" data-fmt="9:16" aria-label="Format 9:16" title="Story / Reel">9:16</button>
    </div>
  </div>
  <!-- IMAGES -->
  <div class="ed" id="imgEd">
    <div class="ed-t">Bilder</div>
    <div class="img-zones">
      <div class="img-zone" id="z0" tabindex="0" role="button" aria-label="Bild 1 hochladen">
        <input type="file" accept="image/jpeg,image/png,image/webp,image/gif" id="f0">
        <img id="pv0" style="display:none" alt="Vorschau Bild 1">
        <div class="ph" id="ph0">Bild 1</div>
        <button class="rm" id="rm0" aria-label="Bild 1 entfernen">&times;</button>
        <input class="crd" id="cr0" placeholder="&copy; Credit" aria-label="Credit fuer Bild 1">
      </div>
      <button class="swap-btn" id="swapBtn" aria-label="Bilder tauschen">&#8644;</button>
      <div class="img-zone" id="z1" style="display:none" tabindex="0" role="button" aria-label="Bild 2 hochladen">
        <input type="file" accept="image/jpeg,image/png,image/webp,image/gif" id="f1">
        <img id="pv1" style="display:none" alt="Vorschau Bild 2">
        <div class="ph" id="ph1">Bild 2</div>
        <button class="rm" id="rm1" aria-label="Bild 2 entfernen">&times;</button>
        <input class="crd" id="cr1" placeholder="&copy; Credit" aria-label="Credit fuer Bild 2">
      </div>
    </div>
    <div class="crop-ctrl" id="cc0" style="display:none">
      <label>Bildausschnitt 1</label>
      <div class="sr">
        <input type="range" id="sl0" min="0" max="100" value="50" aria-label="Bildausschnitt 1">
        <span class="vl" id="vl0">50%</span>
      </div>
    </div>
    <div class="crop-ctrl" id="cc1" style="display:none">
      <label>Bildausschnitt 2</label>
      <div class="sr">
        <input type="range" id="sl1" min="0" max="100" value="50" aria-label="Bildausschnitt 2">
        <span class="vl" id="vl1">50%</span>
      </div>
    </div>
  </div>
  </div><!-- /editor-col -->
</div><!-- /app-layout -->
<div class="hint" id="hint">4:5 Format &middot; 1200 &times; 1500 px</div>
</div>
<!-- HISTORY DRAWER -->
<div class="hist-overlay" id="histOverlay"></div>
<div class="hist-drawer" id="histDrawer" role="dialog" aria-label="Post-Archiv">
  <div class="hist-header">
    <h2>Archiv</h2>
    <button class="hist-close" id="histClose" aria-label="Archiv schließen">&times;</button>
  </div>
  <div class="hist-body" id="histBody">
    <div class="hist-empty" id="histEmpty">Noch keine Posts archiviert.</div>
    <div class="hist-grid" id="histGrid"></div>
  </div>
</div>
<!-- TOAST -->
<div class="toast" id="toast"></div>
<script>
(function(){
"use strict";
// ===== CONSTANTS =====
var SYS_FONT = '-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif';
var MX = 52;                // horizontal margin
var TOP_PAD = 55;           // space above headline
var FOOTER_H = 100;         // footer height
var IMG_GAP = 16;           // gap between two images
var IMG_TOP_GAP = 24;       // gap between text and images
var IMG_MIN_H = 80;         // minimum image height
var HL_MIN_FS = 120;        // minimum headline font size after shrink
var HL_MAX_LINES = 3;       // max wrapped headline lines
var SUB_MAX_LINES = 2;      // max wrapped subtitle lines
var HL_LINE_H_FACTOR = 1.08;  // headline line-height multiplier
var SUB_LINE_H_FACTOR = 1.15; // subtitle line-height multiplier
var FOOTER_FS = 36;         // footer font size
var FOOTER_BOTTOM = 32;     // footer distance from bottom
var LOGO_H = 56;            // logo height in footer
var FORMATS = {
  '4:5':  { w: 1200, h: 1500 },
  '1:1':  { w: 1200, h: 1200 },
  '16:9': { w: 1200, h: 675 },
  '9:16': { w: 1080, h: 1920 }
};
var W = 1200, H = 1500;
var LOGO = new Image();
LOGO.src = "logo.png";
// ===== GRADIENT =====
var GRADIENT_STOPS = [
  [0,    '#025671'],
  [0.50, '#261c53'],
  [1,    '#1f0e1d']
];
// ===== CACHED GRADIENT =====
var gradCV = document.createElement('canvas');
function rebuildGradient() {
  gradCV.width = 1; gradCV.height = H;
  var gx = gradCV.getContext('2d');
  var grad = gx.createLinearGradient(0, 0, 0, H);
  for (var gi = 0; gi < GRADIENT_STOPS.length; gi++) {
    grad.addColorStop(GRADIENT_STOPS[gi][0], GRADIENT_STOPS[gi][1]);
  }
  gx.fillStyle = grad;
  gx.fillRect(0, 0, 1, H);
}
rebuildGradient();
// ===== CANVAS =====
var cv = document.getElementById('cv');
var cx = cv.getContext('2d');
// ===== CONSTANTS =====
var MONTHS_DE = ['Januar','Februar','M\u00e4rz','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];
function todayDE() {
  var d = new Date();
  return d.getDate() + '. ' + MONTHS_DE[d.getMonth()] + ' ' + d.getFullYear();
}
// ===== STATE =====
var S = {
  imgs: [null, null],
  blobs: [null, null],
  creds: ['', ''],
  crop: [50, 50],
  layout: 'one',
  format: '4:5',
  editing: true,
  allCaps: false,
  hlLines: ['Per ChatGPT das eigene Haustier zum Menschen machen'],
  subText: '',
  dateText: todayDE()
};
// ===== DOM REFS =====
var $hl   = document.getElementById('inHL');
var $sub  = document.getElementById('inSub');
var $date = document.getElementById('inDate');
var $EP   = document.getElementById('EP');
var $segCtrl = document.getElementById('segCtrl');
var $segEdit = document.getElementById('segEdit');
var $segPreview = document.getElementById('segPreview');
var $bX   = document.getElementById('bX');
var $bC   = document.getElementById('bC');
var $bS   = document.getElementById('bS');

// ===== INDEXEDDB =====
var DB_NAME = 'ki-news-history';
var DB_VER = 1;
var DB_STORE = 'posts';
function dbOpen() {
  return new Promise(function(resolve, reject) {
    var req = indexedDB.open(DB_NAME, DB_VER);
    req.onupgradeneeded = function(e) {
      var db = e.target.result;
      if (!db.objectStoreNames.contains(DB_STORE)) {
        var store = db.createObjectStore(DB_STORE, { keyPath: 'id' });
        store.createIndex('savedAt', 'savedAt', { unique: false });
      }
    };
    req.onsuccess = function(e) { resolve(e.target.result); };
    req.onerror = function(e) { reject(e.target.error); };
  });
}
function dbAdd(post) {
  return dbOpen().then(function(db) {
    return new Promise(function(resolve, reject) {
      var tx = db.transaction(DB_STORE, 'readwrite');
      tx.objectStore(DB_STORE).put(post);
      tx.oncomplete = function() { resolve(); };
      tx.onerror = function(e) { reject(e.target.error); };
    });
  });
}
function dbGetAll() {
  return dbOpen().then(function(db) {
    return new Promise(function(resolve, reject) {
      var tx = db.transaction(DB_STORE, 'readonly');
      var req = tx.objectStore(DB_STORE).index('savedAt').getAll();
      req.onsuccess = function() { resolve(req.result.reverse()); };
      req.onerror = function(e) { reject(e.target.error); };
    });
  });
}
function dbDelete(id) {
  return dbOpen().then(function(db) {
    return new Promise(function(resolve, reject) {
      var tx = db.transaction(DB_STORE, 'readwrite');
      tx.objectStore(DB_STORE).delete(id);
      tx.oncomplete = function() { resolve(); };
      tx.onerror = function(e) { reject(e.target.error); };
    });
  });
}
// ===== IMAGE COMPRESSION =====
function compressImage(img, maxSide, quality) {
  maxSide = maxSide || 2000;
  quality = quality || 0.8;
  return new Promise(function(resolve) {
    var w = img.naturalWidth, h = img.naturalHeight;
    if (w > maxSide || h > maxSide) {
      var ratio = maxSide / Math.max(w, h);
      w = Math.round(w * ratio);
      h = Math.round(h * ratio);
    }
    var c = document.createElement('canvas');
    c.width = w; c.height = h;
    c.getContext('2d').drawImage(img, 0, 0, w, h);
    c.toBlob(function(blob) { resolve(blob); }, 'image/jpeg', quality);
  });
}
function canvasToThumbnail(canvas, maxW) {
  maxW = maxW || 300;
  return new Promise(function(resolve) {
    var ratio = maxW / canvas.width;
    var c = document.createElement('canvas');
    c.width = maxW;
    c.height = Math.round(canvas.height * ratio);
    c.getContext('2d').drawImage(canvas, 0, 0, c.width, c.height);
    c.toBlob(function(blob) { resolve(blob); }, 'image/jpeg', 0.85);
  });
}

function saveState() {
  try {
    localStorage.setItem(STORE_KEY, JSON.stringify({
      hlLines: S.hlLines, subText: S.subText, dateText: S.dateText,
      layout: S.layout, format: S.format, allCaps: S.allCaps, creds: S.creds
    }));
  } catch(e) { console.warn('saveState failed:', e); }
}
var saveTimer = null;
function debouncedSave() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(saveState, 300);
}
function loadState() {
  try {
    var raw = localStorage.getItem(STORE_KEY);
    if (!raw) return;
    var saved = JSON.parse(raw);
    if (Array.isArray(saved.hlLines)) S.hlLines = saved.hlLines;
    if (typeof saved.subText === 'string') S.subText = saved.subText;
    if (typeof saved.dateText === 'string') S.dateText = saved.dateText;
    if (typeof saved.layout === 'string' && LAYOUT_KEYS[saved.layout]) S.layout = saved.layout;
    if (typeof saved.format === 'string' && FORMATS[saved.format]) S.format = saved.format;
    if (typeof saved.allCaps === 'boolean') S.allCaps = saved.allCaps;
    if (Array.isArray(saved.creds)) S.creds = saved.creds;
  } catch(e) { console.warn('loadState failed:', e); }
}

// ===== WORD WRAP =====
function wrapLine(text, fs, maxWidth) {
  cx.font = 'bold ' + fs + 'px Festivo, serif';
  if (cx.measureText(text).width <= maxWidth) return [text];
  var words = text.split(' ');
  var lines = [], cur = '';
  for (var w = 0; w < words.length; w++) {
    var word = words[w];
    // Break single words that exceed maxWidth
    if (cx.measureText(word).width > maxWidth) {
      if (cur) { lines.push(cur); cur = ''; }
      var chars = '';
      for (var c = 0; c < word.length; c++) {
        var next = chars + word[c];
        if (cx.measureText(next).width > maxWidth && chars) {
          lines.push(chars); chars = word[c];
        } else { chars = next; }
      }
      cur = chars;
      continue;
    }
    var test = cur ? cur + ' ' + word : word;
    if (cx.measureText(test).width > maxWidth && cur) {
      lines.push(cur); cur = word;
    } else { cur = test; }
  }
  if (cur) lines.push(cur);
  return lines;
}

function getCropDirection(idx) {
  var img = S.imgs[idx];
  if (!img) return '';
  var srcR = img.naturalWidth / img.naturalHeight;
  var destR = W / H;
  if (S.layout === 'two') {
    var imgW = Math.round((W - MX * 2 - IMG_GAP) / 2);
    destR = imgW / (H - FOOTER_H);
  }
  return srcR > destR ? 'Horizontaler' : 'Vertikaler';
}

var MAX_IMAGE_SIZE = 8 * 1024 * 1024; // 8 MB
function loadImageFile(i, file) {
  if (!file || !/^image\/(jpeg|png|webp|gif)$/.test(file.type)) {
    if (file) showToast('\u26a0 Nur JPG, PNG, WebP oder GIF');
    return;
  }
  if (file.size > MAX_IMAGE_SIZE) {
    showToast('\u26a0 Bild zu gro\u00df (max. 8 MB)');
    return;
  }
  revokeBlob(i);
  var blobUrl = URL.createObjectURL(file);
  var im = new Image();
  im.onload = function() {
    S.imgs[i] = im;
    S.blobs[i] = blobUrl;
    S.crop[i] = 50;
    renderUI();
  };
  im.onerror = function() {
    URL.revokeObjectURL(blobUrl);
    showToast('\u26a0 Bild konnte nicht geladen werden');
    $f[i].value = '';
  };
  im.src = blobUrl;
}

// ===== DRAW HELPERS =====
function prepareText(maxW) {
  cx.save(); // isolate font side-effects from measurement phase
  var headlineText = S.hlLines.join('\n');
  if (S.allCaps) headlineText = headlineText.toUpperCase();
  var isNone = (S.layout === 'none');
  var hlFS = isNone ? (S.hlLines.length > 1 ? 230 : 260) : (S.hlLines.length > 1 ? 120 : 130);
  var subFS = isNone ? 90 : 60;
  // Auto-shrink headline
  var rawLines = headlineText.split('\n');
  cx.font = 'bold ' + hlFS + 'px Festivo, serif';
  var worstRatio = 1;
  for (var k = 0; k < rawLines.length; k++) {
    var mw = cx.measureText(rawLines[k]).width;
    if (mw > maxW) {
      var ratio = maxW / mw;
      if (ratio < worstRatio) worstRatio = ratio;
    }
  }
  if (worstRatio < 1) {
    hlFS = Math.max(Math.floor(hlFS * worstRatio), HL_MIN_FS);
  }
  // Word-wrap headline
  var hlArr = [];
  for (var r = 0; r < rawLines.length; r++) {
    var wrapped = wrapLine(rawLines[r], hlFS, maxW);
    for (var wr = 0; wr < wrapped.length && hlArr.length < HL_MAX_LINES; wr++) {
      hlArr.push(wrapped[wr]);
    }
  }
  // Subtitle — manual line breaks via Enter
  var subArr = [];
  if (S.subText) {
    var subLines = S.subText.split('\n').filter(function(l) { return l.length > 0; });
    for (var sl = 0; sl < subLines.length && subArr.length < SUB_MAX_LINES; sl++) {
      var wSub = wrapLine(subLines[sl], subFS, maxW);
      for (var ws = 0; ws < wSub.length && subArr.length < SUB_MAX_LINES; ws++) {
        subArr.push(wSub[ws]);
      }
    }
  }
  cx.restore(); // end measurement phase
  return { hlArr: hlArr, hlFS: hlFS, subArr: subArr, subFS: subFS, isNone: isNone };
}
function drawText(t, maxW) {
  var hlLineH = Math.round(t.hlFS * HL_LINE_H_FACTOR);
  var hlBlockH = t.hlArr.length * hlLineH;
  var subLineH = Math.round(t.subFS * SUB_LINE_H_FACTOR);
  var subBlockH = t.subArr.length > 0 ? t.subArr.length * subLineH : 0;
  var subGap = t.isNone ? 20 : 14;
  // Y position
  var curY;
  if (t.isNone) {
    var availH = H - TOP_PAD - FOOTER_H;
    var totalH = hlBlockH + (subBlockH > 0 ? subGap + subBlockH : 0);
    curY = TOP_PAD + Math.round((availH - totalH) / 2);
  } else {
    curY = TOP_PAD;
  }
  // Headline (centered)
  cx.font = 'bold ' + t.hlFS + 'px Festivo, serif';
  cx.fillStyle = '#ffffff';
  cx.textBaseline = 'top';
  cx.textAlign = 'center';
  var centerX = W / 2;
  for (var li = 0; li < t.hlArr.length; li++) {
    cx.fillText(t.hlArr[li], centerX, curY + li * hlLineH);
  }
  curY += hlBlockH;
  // Subtitle (centered)
  if (t.subArr.length > 0) {
    curY += subGap;
    cx.font = '700 ' + t.subFS + 'px Festivo, serif';
    cx.fillStyle = 'rgba(210,225,240,0.9)';
    for (var sj = 0; sj < t.subArr.length; sj++) {
      cx.fillText(t.subArr[sj], centerX, curY + sj * subLineH);
    }
    curY += t.subArr.length * subLineH;
  }
  cx.textAlign = 'left';
  return curY;
}
function drawImages(curY) {
  var imgTop = curY + IMG_TOP_GAP;
  var imgH = Math.max(H - FOOTER_H - imgTop, IMG_MIN_H);
  if (S.layout === 'two') {
    var imgW = Math.round((W - MX * 2 - IMG_GAP) / 2);
    drawCroppedImage(0, MX, imgTop, imgW, imgH);
    drawCroppedImage(1, MX + imgW + IMG_GAP, imgTop, imgW, imgH);
  } else {
    drawCroppedImage(0, MX, imgTop, W - MX * 2, imgH);
  }
}
function drawFooter() {
  cx.textBaseline = 'bottom';
  cx.font = '500 ' + FOOTER_FS + 'px Festivo, serif';
  cx.fillStyle = '#ffffff';
  cx.textAlign = 'center';
  cx.fillText('vandieken.com', W / 2, H - FOOTER_BOTTOM);
  cx.textAlign = 'left';
  cx.fillText(S.dateText, MX, H - FOOTER_BOTTOM);
  if (LOGO.complete && LOGO.naturalWidth > 0) {
    var lw = LOGO_H * (LOGO.naturalWidth / LOGO.naturalHeight);
    cx.globalAlpha = 0.85;
    cx.drawImage(LOGO, W - MX - lw, H - FOOTER_BOTTOM - LOGO_H + 6, lw, LOGO_H);
    cx.globalAlpha = 1;
  }
  cx.textBaseline = 'alphabetic';
  cx.textAlign = 'left';
}
// ===== DRAW =====
function draw() {
  cx.drawImage(gradCV, 0, 0, 1, H, 0, 0, W, H);
  var maxW = W - MX * 2;
  var t = prepareText(maxW);
  var curY = drawText(t, maxW);
  if (!t.isNone) drawImages(curY);
  drawFooter();
}
// ===== DRAW CROPPED IMAGE =====
function drawCroppedImage(idx, dx, dy, dw, dh) {
  var img = S.imgs[idx];
  cx.save();
  if (!img) {
    cx.fillStyle = '#f0f0f0';
    cx.fillRect(dx, dy, dw, dh);
    cx.fillStyle = '#bbb';
    cx.font = '600 28px ' + SYS_FONT;
    cx.textAlign = 'center';
    cx.textBaseline = 'middle';
    cx.fillText('Bild ' + (idx + 1), dx + dw / 2, dy + dh / 2);
    cx.restore();
    return;
  }
  var iw = img.naturalWidth, ih = img.naturalHeight;
  var destR = dw / dh, srcR = iw / ih;
  var sx, sy, sw, sh;
  if (srcR > destR) {
    sh = ih; sw = ih * destR; sy = 0;
    sx = (iw - sw) * (S.crop[idx] / 100);
  } else {
    sw = iw; sh = iw / destR; sx = 0;
    sy = (ih - sh) * (S.crop[idx] / 100);
  }
  cx.drawImage(img, sx, sy, sw, sh, dx, dy, dw, dh);
  if (S.creds[idx]) {
    cx.font = '500 20px ' + SYS_FONT;
    cx.fillStyle = 'rgba(255,255,255,0.85)';
    cx.textAlign = 'right';
    cx.textBaseline = 'bottom';
    cx.fillText(S.creds[idx], dx + dw - 10, dy + dh - 10);
  }
  cx.restore();
}
// ===== HISTORY: ARCHIVE POST =====
$bA.addEventListener('click', function() {
  var btn = this;
  if (!S.hlLines.join('').trim() && !S.subText.trim() && !S.imgs[0] && !S.imgs[1]) {
    showToast('\u26a0 Nichts zum Archivieren');
    return;
  }
  btn.disabled = true; btn.textContent = 'Speichert\u2026';
  scheduleDraw();
  requestAnimationFrame(function() {
    var promises = [];
    // Compress images
    for (var i = 0; i < 2; i++) {
      if (S.imgs[i]) {
        promises.push(compressImage(S.imgs[i]));
      } else {
        promises.push(Promise.resolve(null));
      }
    }
    // Generate thumbnail
    promises.push(canvasToThumbnail(cv));
    Promise.all(promises).then(function(results) {
      var post = {
        id: Date.now(),
        savedAt: new Date().toISOString(),
        headline: S.hlLines.join('\n'),
        subtitle: S.subText,
        date: S.dateText,
        layout: S.layout,
        format: S.format,
        allCaps: S.allCaps,
        credits: S.creds.slice(),
        crops: S.crop.slice(),
        thumbnail: results[2],
        images: [results[0], results[1]]
      };
      return dbAdd(post);
    }).then(function() {
      btn.textContent = '\u2713 Archiviert!';
      btn.classList.add('btn-success');
      showToast('\u2713 Post archiviert');
      setTimeout(function() {
        btn.disabled = false;
        btn.textContent = 'Archivieren';
        btn.classList.remove('btn-success');
      }, 1500);
    }).catch(function(err) {
      console.warn('Archive failed:', err);
      btn.disabled = false; btn.textContent = 'Archivieren';
      showToast('\u26a0 Archivierung fehlgeschlagen');
    });
  });
});
// ===== HISTORY: DRAWER =====
function openHistory() {
  $histOverlay.classList.add('open');
  $histDrawer.classList.add('open');
  loadHistoryGrid();
}
function closeHistory() {
  $histOverlay.classList.remove('open');
  $histDrawer.classList.remove('open');
}
$bH.addEventListener('click', openHistory);
$histClose.addEventListener('click', closeHistory);
$histOverlay.addEventListener('click', closeHistory);
function loadHistoryGrid() {
  dbGetAll().then(function(posts) {
    $histGrid.innerHTML = '';
    $histEmpty.style.display = posts.length ? 'none' : 'block';
    posts.forEach(function(post) {
      var item = document.createElement('div');
      item.className = 'hist-item';
      item.setAttribute('tabindex', '0');
      item.setAttribute('role', 'button');
      item.setAttribute('aria-label', 'Post laden: ' + (post.headline || 'Ohne Titel'));
      // Thumbnail
      var img = document.createElement('img');
      if (post.thumbnail) {
        var thumbUrl = URL.createObjectURL(post.thumbnail);
        img.src = thumbUrl;
        img.onload = function() { URL.revokeObjectURL(thumbUrl); };
      }
      img.alt = post.headline || 'Post';
      item.appendChild(img);
      // Info
      var info = document.createElement('div');
      info.className = 'hist-item-info';
      var title = document.createElement('div');
      title.className = 'hist-item-title';
      title.textContent = post.headline || 'Ohne Titel';
      info.appendChild(title);
      var date = document.createElement('div');
      date.className = 'hist-item-date';
      date.textContent = post.date || new Date(post.savedAt).toLocaleDateString('de-DE');
      info.appendChild(date);
      item.appendChild(info);
      // Delete button
      var del = document.createElement('button');
      del.className = 'hist-del';
      del.innerHTML = '&times;';
      del.setAttribute('aria-label', 'Post löschen');
      del.addEventListener('click', function(e) {
        e.stopPropagation();
        if (!confirm('Post aus Archiv löschen?')) return;
        dbDelete(post.id).then(function() {
          loadHistoryGrid();
          showToast('\u2713 Post gelöscht');
        });
      });
      item.appendChild(del);
      // Load on click
      item.addEventListener('click', function() {
        loadArchivedPost(post);
      });
      item.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); loadArchivedPost(post); }
      });
      $histGrid.appendChild(item);
    });
  }).catch(function(err) {
    console.warn('loadHistoryGrid failed:', err);
    $histEmpty.style.display = 'block';
    $histEmpty.textContent = 'Fehler beim Laden des Archivs.';
  });
}
// ===== HISTORY: LOAD POST =====
function loadArchivedPost(post) {
  var hasContent = S.imgs[0] || S.imgs[1] || S.hlLines.join('').trim() || S.subText.trim();
  if (hasContent && !confirm('Aktuellen Post ersetzen und archivierten Post laden?')) return;
  // Clean up current images
  revokeBlob(0); revokeBlob(1);
  S.imgs = [null, null]; S.blobs = [null, null];
  // Restore metadata
  S.hlLines = post.headline ? post.headline.split('\n') : [''];
  S.subText = post.subtitle || '';
  S.dateText = post.date || todayDE();
  S.allCaps = !!post.allCaps;
  S.creds = Array.isArray(post.credits) ? post.credits.slice() : ['', ''];
  S.crop = Array.isArray(post.crops) ? post.crops.slice() : [50, 50];
  // Update text inputs
  $hl.value = S.hlLines.join('\n');
  $sub.value = S.subText;
  $date.value = S.dateText;
  $togCaps.classList.toggle('on', S.allCaps);
  $togCaps.setAttribute('aria-checked', String(S.allCaps));
  $f[0].value = ''; $f[1].value = '';
  // Set layout and format
  setLayout(post.layout || 'one');
  setFormat(post.format || '4:5');
  // Load images from blobs
  var loaded = 0, total = 0;
  function onAllLoaded() {
    autoSize($hl); autoSize($sub);
    renderUI(); saveState();
    closeHistory();
    showToast('\u2713 Post geladen');
  }
  for (var i = 0; i < 2; i++) {
    if (post.images && post.images[i]) {
      total++;
      (function(idx, blob) {
        var blobUrl = URL.createObjectURL(blob);
        var im = new Image();
        im.onload = function() {
          S.imgs[idx] = im;
          S.blobs[idx] = blobUrl;
          loaded++;
          if (loaded >= total) onAllLoaded();
        };
        im.onerror = function() {
          URL.revokeObjectURL(blobUrl);
          loaded++;
          if (loaded >= total) onAllLoaded();
        };
        im.src = blobUrl;
      })(i, post.images[i]);
    }
  }
  if (total === 0) onAllLoaded();
}
// ===== INIT =====
function init() {
  if (document.fonts && !document.fonts.check('12px Festivo')) {
    showToast('\u26a0 Font l\u00e4dt\u2026');
  }
  $hl.value = S.hlLines.join('\n');
  $sub.value = S.subText;
  $date.value = S.dateText;
  $togCaps.classList.toggle('on', S.allCaps);
  $togCaps.setAttribute('aria-checked', String(S.allCaps));
  setLayout(S.layout);
  setFormat(S.format);
  // On desktop: always show editor; on mobile: respect S.editing
  if (isDesktop()) {
    $EP.style.display = 'block';
  } else {
    $EP.style.display = S.editing ? 'block' : 'none';
    $segEdit.classList.toggle('active', S.editing);
    $segPreview.classList.toggle('active', !S.editing);
  }
  autoSize($hl);
  autoSize($sub);
  draw();
}
var initialized = false;
function safeInit(fontOk) {
  if (initialized) return;
  initialized = true;
  if (!fontOk) showToast('\u26a0 Font nicht verf\u00fcgbar \u2013 Fallback aktiv');
  init();
}
if (document.fonts && document.fonts.load) {
  document.fonts.load('bold 48px Festivo').then(function() {
    safeInit(true);
  }).catch(function() {
    safeInit(false);
  });
  setTimeout(function() { safeInit(false); }, 3000);
} else {
  window.addEventListener('load', function() { safeInit(true); });
}
window.addEventListener('resize', function() {
  // Ensure editor visibility matches layout mode
  if (isDesktop()) {
    $EP.style.display = 'block';
  }
  scheduleDraw();
});
})();
</script>
